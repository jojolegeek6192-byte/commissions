<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Commissions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --black: #0a0a0a;
  --white: #ffffff;
  --gray-50: #fafafa;
  --gray-100: #f0f0f0;
  --gray-300: #c7c7c7;
  --gray-500: #8a8a8a;
  --gray-700: #444444;
  --border: #e2e2e2;
  --radius: 10px;
  --font-head: 'Space Grotesk', sans-serif;
  --font-body: 'Inter', sans-serif;
  --red: #c53434;
  --red-bg: #fbeaea;
  --amber: #a8710b;
  --amber-bg: #fbf1e0;
  --bg: var(--white);
  --fg: var(--black);
  --card-bg: var(--white);
}
:root[data-theme="dark"] {
  --black: #f2f2f2;
  --white: #111111;
  --gray-50: #1a1a1a;
  --gray-100: #222222;
  --gray-300: #3a3a3a;
  --gray-500: #8a8a8a;
  --gray-700: #c7c7c7;
  --border: #2a2a2a;
  --bg: #0a0a0a;
  --fg: #f2f2f2;
  --card-bg: #131313;
  --red-bg: #2a1414;
  --amber-bg: #2a2010;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--fg);
  -webkit-font-smoothing: antialiased;
}
.hidden { display: none !important; }
.btn {
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 500;
  padding: 9px 15px;
  border-radius: 7px;
  border: 1px solid transparent;
  cursor: pointer;
  white-space: nowrap;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.btn-primary { background: var(--black); color: var(--white); }
.btn-primary:hover { opacity: 0.85; }
.btn-ghost { background: transparent; color: var(--gray-700); border-color: var(--border); }
.btn-ghost:hover { background: var(--gray-50); }
.btn-icon { padding: 9px 10px; }
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 40px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
  gap: 12px;
}
.logo { font-family: var(--font-head); font-weight: 600; font-size: 18px; letter-spacing: -0.02em; }
.topbar-right { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.toolbar {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
  padding: 16px 40px 0;
}
.toolbar input, .toolbar select {
  padding: 8px 12px;
  border-radius: 7px;
  border: 1px solid var(--border);
  font-size: 13px;
  font-family: var(--font-body);
  background: var(--card-bg);
  color: var(--fg);
}
.toolbar input[type="text"] { min-width: 200px; }
.tabs { display: flex; gap: 4px; padding: 16px 40px 0; }
.tab-btn {
  background: none;
  border: none;
  padding: 8px 4px;
  font-size: 13px;
  font-weight: 500;
  color: var(--gray-500);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-right: 18px;
}
.tab-btn.active { color: var(--fg); border-bottom-color: var(--fg); }
.main { max-width: 1180px; margin: 0 auto; padding: 24px 40px 60px; }
.stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; margin-bottom: 28px; }
.stat-card { border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; }
.stat-label { display: block; font-size: 11.5px; color: var(--gray-500); margin-bottom: 8px; }
.stat-value { display: block; font-family: var(--font-head); font-size: 21px; font-weight: 600; letter-spacing: -0.01em; }
.board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
.column-header { display: flex; align-items: center; justify-content: space-between; padding: 0 2px; margin-bottom: 12px; }
.column-title { font-size: 13px; font-weight: 600; color: var(--gray-700); text-transform: uppercase; letter-spacing: 0.03em; }
.column-count { font-size: 12px; color: var(--gray-500); background: var(--gray-100); border-radius: 20px; padding: 1px 8px; }
.column-list { display: flex; flex-direction: column; gap: 10px; min-height: 40px; }
.card { border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; background: var(--card-bg); cursor: pointer; }
.card:hover { border-color: var(--gray-300); }
.card.overdue { border-color: var(--red); background: var(--red-bg); }
.card.soon { border-color: var(--amber); background: var(--amber-bg); }
.card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 6px; margin-bottom: 8px; }
.card-client { font-weight: 600; font-size: 14px; }
.card-del { background: none; border: none; color: var(--gray-300); cursor: pointer; font-size: 16px; line-height: 1; padding: 0; }
.card-del:hover { color: var(--fg); }
.card-tag-row { display: flex; gap: 6px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
.card-tag { display: inline-block; font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 20px; background: var(--black); color: var(--white); }
.card-flag { font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 20px; }
.card-flag.overdue { background: var(--red); color: white; }
.card-flag.soon { background: var(--amber); color: white; }
.card-desc { font-size: 13px; color: var(--gray-700); line-height: 1.55; margin: 0 0 8px; }
.card-notes { font-size: 12px; color: var(--gray-500); font-style: italic; line-height: 1.5; margin: 0 0 10px; }
.card-link { font-size: 12px; margin-bottom: 10px; display: block; }
.card-link a { color: var(--gray-700); }
.card-meta { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--gray-500); margin-bottom: 10px; }
.card-price { font-weight: 600; color: var(--fg); text-align: right; }
.card-price small { display: block; font-weight: 400; color: var(--gray-500); font-size: 11px; }
.card-actions { display: flex; gap: 6px; border-top: 1px solid var(--border); padding-top: 10px; }
.move-btn, .icon-action-btn { flex: 1; background: none; border: 1px solid var(--border); border-radius: 6px; padding: 6px; cursor: pointer; font-size: 13px; color: var(--gray-700); }
.move-btn:hover, .icon-action-btn:hover { background: var(--gray-50); border-color: var(--gray-300); }
.empty-col { border: 1px dashed var(--border); border-radius: var(--radius); padding: 20px; text-align: center; font-size: 12px; color: var(--gray-300); }
.archive-list { display: flex; flex-direction: column; gap: 10px; }
.archive-row {
  display: flex; align-items: center; justify-content: space-between;
  border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 16px;
}
.archive-row .info { display: flex; flex-direction: column; gap: 2px; }
.archive-row .info strong { font-size: 14px; }
.archive-row .info span { font-size: 12px; color: var(--gray-500); }
.modal-overlay { position: fixed; inset: 0; background: rgba(10,10,10,0.5); display: flex; align-items: center; justify-content: center; z-index: 50; padding: 16px; }
.modal { width: 480px; max-width: 100%; max-height: 90vh; overflow-y: auto; background: var(--card-bg); border-radius: 14px; }
.modal-header { display: flex; justify-content: space-between; align-items: center; padding: 18px 22px; border-bottom: 1px solid var(--border); }
.modal-header h2 { font-family: var(--font-head); font-size: 17px; font-weight: 600; margin: 0; }
.modal-body { padding: 20px 22px; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 12px; font-weight: 500; color: var(--gray-700); margin-bottom: 6px; }
.field input, .field select, .field textarea {
  width: 100%; padding: 10px 12px; border-radius: 7px; border: 1px solid var(--border);
  font-size: 14px; font-family: var(--font-body); background: var(--card-bg); color: var(--fg);
}
.field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--fg); }
.field textarea { min-height: 60px; resize: vertical; }
.modal-footer { display: flex; justify-content: space-between; gap: 10px; padding: 16px 22px; border-top: 1px solid var(--border); }
.icon-btn { background: none; border: none; font-size: 22px; line-height: 1; cursor: pointer; color: var(--gray-500); padding: 4px 8px; }
.icon-btn:hover { color: var(--fg); }
@media (max-width: 900px) {
  .stats { grid-template-columns: repeat(2, 1fr); }
  .board { grid-template-columns: 1fr 1fr; }
  .topbar, .main, .toolbar, .tabs { padding-left: 20px; padding-right: 20px; }
}
@media (max-width: 560px) {
  .board { grid-template-columns: 1fr; }
  .field-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

  <header class="topbar">
    <span class="logo">Commissions</span>
    <div class="topbar-right">
      <button id="theme-toggle" class="btn btn-ghost btn-icon" aria-label="Basculer le theme">&#9680;</button>
      <button id="export-btn" class="btn btn-ghost">Exporter CSV</button>
      <button id="new-order-btn" class="btn btn-primary">Nouvelle commande</button>
    </div>
  </header>

  <div class="tabs">
    <button class="tab-btn active" id="tab-actif">Actif</button>
    <button class="tab-btn" id="tab-archive">Archive</button>
  </div>

  <div class="toolbar" id="toolbar">
    <input type="text" id="search-input" placeholder="Rechercher un client..." />
    <select id="filter-type">
      <option value="">Tous les types</option>
      <option value="Build">Build / map</option>
      <option value="Script">Script</option>
      <option value="UI">UI / GFX</option>
      <option value="Systeme">Systeme complet</option>
      <option value="Autre">Autre</option>
    </select>
    <select id="sort-select">
      <option value="deadline">Trier par deadline</option>
      <option value="recent">Plus recent d'abord</option>
      <option value="client">Nom du client</option>
    </select>
  </div>

  <main class="main">
    <section class="stats">
      <div class="stat-card">
        <span class="stat-label">Commandes actives</span>
        <span class="stat-value" id="stat-active">0</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">A encaisser</span>
        <span class="stat-value" id="stat-pending">0</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Encaisse (total)</span>
        <span class="stat-value" id="stat-paid">0</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Encaisse (ce mois)</span>
        <span class="stat-value" id="stat-paid-month">0</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Total commandes</span>
        <span class="stat-value" id="stat-total">0</span>
      </div>
    </section>

    <section class="board hidden" id="board"></section>
    <section id="archive-section" class="hidden">
      <div class="archive-list" id="archive-list"></div>
    </section>
  </main>

  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">Nouvelle commande</h2>
        <button id="modal-close" class="icon-btn" aria-label="Fermer">&times;</button>
      </div>
      <div class="modal-body">
        <div class="field-row">
          <div class="field">
            <label for="f-client">Client</label>
            <input type="text" id="f-client" placeholder="Pseudo Discord ou Roblox" />
          </div>
          <div class="field">
            <label for="f-type">Type</label>
            <select id="f-type">
              <option value="Build">Build / map</option>
              <option value="Script">Script</option>
              <option value="UI">UI / GFX</option>
              <option value="Systeme">Systeme complet</option>
              <option value="Autre">Autre</option>
            </select>
          </div>
        </div>
        <div class="field">
          <label for="f-desc">Description</label>
          <textarea id="f-desc" placeholder="Details de la demande du client"></textarea>
        </div>
        <div class="field-row">
          <div class="field">
            <label for="f-price">Prix total</label>
            <input type="text" id="f-price" placeholder="ex: 500 R$ ou 20e" />
          </div>
          <div class="field">
            <label for="f-deposit">Acompte verse</label>
            <input type="text" id="f-deposit" placeholder="ex: 100 R$" />
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label for="f-deadline">Deadline</label>
            <input type="date" id="f-deadline" />
          </div>
          <div class="field">
            <label for="f-link">Lien (Discord, Trello...)</label>
            <input type="text" id="f-link" placeholder="https://..." />
          </div>
        </div>
        <div class="field">
          <label for="f-notes">Notes internes</label>
          <textarea id="f-notes" placeholder="ex: payer avant de livrer, client difficile..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button id="delete-btn" class="btn btn-ghost hidden">Supprimer</button>
        <div style="flex:1"></div>
        <button id="cancel-btn" class="btn btn-ghost">Annuler</button>
        <button id="save-btn" class="btn btn-primary">Ajouter</button>
      </div>
    </div>
  </div>

<script>
const STATUSES = [
  { key: 'attente', label: 'En attente' },
  { key: 'cours', label: 'En cours' },
  { key: 'review', label: 'En review' },
  { key: 'livre', label: 'Livre / paye' }
];
const STORAGE_KEY = 'commissions_data';
const THEME_KEY = 'commissions_theme';

let orders = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
let editingId = null;
let currentTab = 'actif';

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(orders));
}

function extractNumber(str) {
  if (!str) return 0;
  const match = String(str).match(/[\d.]+/);
  return match ? parseFloat(match[0]) : 0;
}

function formatDate(d) {
  const [y, m, day] = d.split('-');
  return `${day}/${m}/${y}`;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str == null ? '' : str;
  return div.innerHTML;
}

function daysUntil(dateStr) {
  const today = new Date();
  today.setHours(0,0,0,0);
  const target = new Date(dateStr);
  target.setHours(0,0,0,0);
  return Math.round((target - today) / (1000 * 60 * 60 * 24));
}

// ---------- Theme ----------
function initTheme() {
  const saved = localStorage.getItem(THEME_KEY) || 'light';
  document.documentElement.setAttribute('data-theme', saved);
}
document.getElementById('theme-toggle').addEventListener('click', () => {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem(THEME_KEY, next);
});
initTheme();

// ---------- Tabs ----------
document.getElementById('tab-actif').addEventListener('click', () => switchTab('actif'));
document.getElementById('tab-archive').addEventListener('click', () => switchTab('archive'));

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-actif').classList.toggle('active', tab === 'actif');
  document.getElementById('tab-archive').classList.toggle('active', tab === 'archive');
  document.getElementById('board').classList.toggle('hidden', tab !== 'actif');
  document.getElementById('archive-section').classList.toggle('hidden', tab !== 'archive');
  document.getElementById('toolbar').classList.toggle('hidden', tab !== 'actif');
  document.getElementById('new-order-btn').classList.toggle('hidden', tab !== 'actif');
  render();
}

// ---------- Search / filter / sort ----------
document.getElementById('search-input').addEventListener('input', render);
document.getElementById('filter-type').addEventListener('change', render);
document.getElementById('sort-select').addEventListener('change', render);

function getFilteredActive() {
  const search = document.getElementById('search-input').value.trim().toLowerCase();
  const type = document.getElementById('filter-type').value;
  const sort = document.getElementById('sort-select').value;

  let list = orders.filter(o => !o.archived);
  if (search) list = list.filter(o => o.client.toLowerCase().includes(search));
  if (type) list = list.filter(o => o.type === type);

  list = list.slice();
  if (sort === 'deadline') {
    list.sort((a, b) => {
      if (!a.deadline && !b.deadline) return 0;
      if (!a.deadline) return 1;
      if (!b.deadline) return -1;
      return a.deadline.localeCompare(b.deadline);
    });
  } else if (sort === 'recent') {
    list.sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));
  } else if (sort === 'client') {
    list.sort((a, b) => a.client.localeCompare(b.client));
  }
  return list;
}

// ---------- Render ----------
function render() {
  if (currentTab === 'actif') renderBoard(); else renderArchive();
  renderStats();
}

function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  const filtered = getFilteredActive();

  STATUSES.forEach((st) => {
    const items = filtered.filter(o => o.status === st.key);

    const col = document.createElement('div');
    col.className = 'column';

    const header = document.createElement('div');
    header.className = 'column-header';
    header.innerHTML = `<span class="column-title">${st.label}</span><span class="column-count">${items.length}</span>`;
    col.appendChild(header);

    const list = document.createElement('div');
    list.className = 'column-list';

    if (items.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty-col';
      empty.textContent = 'Vide';
      list.appendChild(empty);
    }

    items.forEach((o) => {
      const idx = STATUSES.findIndex(s => s.key === st.key);
      const canLeft = idx > 0;
      const canRight = idx < STATUSES.length - 1;

      let flag = '';
      let cardClass = 'card';
      if (o.deadline && st.key !== 'livre') {
        const d = daysUntil(o.deadline);
        if (d < 0) { flag = '<span class="card-flag overdue">En retard</span>'; cardClass += ' overdue'; }
        else if (d <= 3) { flag = '<span class="card-flag soon">Bientot</span>'; cardClass += ' soon'; }
      }

      const card = document.createElement('div');
      card.className = cardClass;
      card.dataset.id = o.id;

      const priceLine = o.deposit
        ? `<span class="card-price">${escapeHtml(o.price || '-')}<small>Acompte: ${escapeHtml(o.deposit)}</small></span>`
        : `<span class="card-price">${escapeHtml(o.price || '-')}</span>`;

      card.innerHTML = `
        <div class="card-top">
          <span class="card-client">${escapeHtml(o.client)}</span>
          <button class="card-del" data-del="${o.id}" aria-label="Supprimer">&times;</button>
        </div>
        <div class="card-tag-row">
          <span class="card-tag">${escapeHtml(o.type)}</span>
          ${flag}
        </div>
        <p class="card-desc">${escapeHtml(o.description)}</p>
        ${o.notes ? `<p class="card-notes">${escapeHtml(o.notes)}</p>` : ''}
        ${o.link ? `<span class="card-link"><a href="${escapeHtml(o.link)}" target="_blank" rel="noopener">Voir le lien</a></span>` : ''}
        <div class="card-meta">
          <span>${o.deadline ? formatDate(o.deadline) : ''}</span>
          ${priceLine}
        </div>
        <div class="card-actions">
          ${canLeft ? `<button class="move-btn" data-move="${o.id}" data-dir="-1">&larr;</button>` : ''}
          ${st.key === 'livre' ? `<button class="icon-action-btn" data-archive="${o.id}">Archiver</button>` : ''}
          ${canRight ? `<button class="move-btn" data-move="${o.id}" data-dir="1">&rarr;</button>` : ''}
        </div>
      `;
      list.appendChild(card);
    });

    col.appendChild(list);
    board.appendChild(col);
  });

  document.querySelectorAll('[data-del]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      orders = orders.filter(o => o.id !== btn.dataset.del);
      save();
      render();
    });
  });

  document.querySelectorAll('[data-archive]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const order = orders.find(o => o.id === btn.dataset.archive);
      order.archived = true;
      save();
      render();
    });
  });

  document.querySelectorAll('[data-move]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const order = orders.find(o => o.id === btn.dataset.move);
      const dir = parseInt(btn.dataset.dir, 10);
      const idx = STATUSES.findIndex(s => s.key === order.status);
      const next = STATUSES[idx + dir];
      if (!next) return;
      order.status = next.key;
      save();
      render();
    });
  });

  document.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', () => openEdit(card.dataset.id));
  });
}

function renderArchive() {
  const listEl = document.getElementById('archive-list');
  listEl.innerHTML = '';
  const archived = orders.filter(o => o.archived);

  if (archived.length === 0) {
    listEl.innerHTML = '<div class="empty-col">Aucune commande archivee</div>';
    return;
  }

  archived.forEach(o => {
    const row = document.createElement('div');
    row.className = 'archive-row';
    row.innerHTML = `
      <div class="info">
        <strong>${escapeHtml(o.client)}</strong>
        <span>${escapeHtml(o.type)} - ${escapeHtml(o.price || '-')}${o.deadline ? ' - ' + formatDate(o.deadline) : ''}</span>
      </div>
      <div style="display:flex; gap:8px;">
        <button class="btn btn-ghost" data-restore="${o.id}">Restaurer</button>
        <button class="btn btn-ghost" data-del-archive="${o.id}">Supprimer</button>
      </div>
    `;
    listEl.appendChild(row);
  });

  document.querySelectorAll('[data-restore]').forEach(btn => {
    btn.addEventListener('click', () => {
      const order = orders.find(o => o.id === btn.dataset.restore);
      order.archived = false;
      save();
      render();
    });
  });
  document.querySelectorAll('[data-del-archive]').forEach(btn => {
    btn.addEventListener('click', () => {
      orders = orders.filter(o => o.id !== btn.dataset.delArchive);
      save();
      render();
    });
  });
}

function renderStats() {
  const active = orders.filter(o => !o.archived && o.status !== 'livre').length;
  let pendingValue = 0, paidValue = 0, paidValueMonth = 0;
  const now = new Date();

  orders.forEach(o => {
    const num = extractNumber(o.price);
    if (o.status === 'livre') {
      paidValue += num;
      if (o.createdAt) {
        const d = new Date(o.createdAt);
        if (d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear()) {
          paidValueMonth += num;
        }
      }
    } else if (!o.archived) {
      pendingValue += num;
    }
  });

  document.getElementById('stat-active').textContent = active;
  document.getElementById('stat-pending').textContent = pendingValue.toLocaleString('fr-FR');
  document.getElementById('stat-paid').textContent = paidValue.toLocaleString('fr-FR');
  document.getElementById('stat-paid-month').textContent = paidValueMonth.toLocaleString('fr-FR');
  document.getElementById('stat-total').textContent = orders.length;
}

// ---------- Modal (create + edit) ----------
const modalOverlay = document.getElementById('modal-overlay');

document.getElementById('new-order-btn').addEventListener('click', () => openCreate());
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('cancel-btn').addEventListener('click', closeModal);

function openCreate() {
  editingId = null;
  document.getElementById('modal-title').textContent = 'Nouvelle commande';
  document.getElementById('save-btn').textContent = 'Ajouter';
  document.getElementById('delete-btn').classList.add('hidden');
  clearForm();
  modalOverlay.classList.remove('hidden');
}

function openEdit(id) {
  const o = orders.find(x => x.id === id);
  if (!o) return;
  editingId = id;
  document.getElementById('modal-title').textContent = 'Modifier la commande';
  document.getElementById('save-btn').textContent = 'Enregistrer';
  document.getElementById('delete-btn').classList.remove('hidden');
  document.getElementById('f-client').value = o.client || '';
  document.getElementById('f-type').value = o.type || 'Build';
  document.getElementById('f-desc').value = o.description || '';
  document.getElementById('f-price').value = o.price || '';
  document.getElementById('f-deposit').value = o.deposit || '';
  document.getElementById('f-deadline').value = o.deadline || '';
  document.getElementById('f-link').value = o.link || '';
  document.getElementById('f-notes').value = o.notes || '';
  modalOverlay.classList.remove('hidden');
}

function clearForm() {
  document.getElementById('f-client').value = '';
  document.getElementById('f-type').value = 'Build';
  document.getElementById('f-desc').value = '';
  document.getElementById('f-price').value = '';
  document.getElementById('f-deposit').value = '';
  document.getElementById('f-deadline').value = '';
  document.getElementById('f-link').value = '';
  document.getElementById('f-notes').value = '';
}

function closeModal() {
  modalOverlay.classList.add('hidden');
  editingId = null;
  clearForm();
}

document.getElementById('save-btn').addEventListener('click', () => {
  const client = document.getElementById('f-client').value.trim();
  const type = document.getElementById('f-type').value;
  const description = document.getElementById('f-desc').value.trim();
  const price = document.getElementById('f-price').value.trim();
  const deposit = document.getElementById('f-deposit').value.trim();
  const deadline = document.getElementById('f-deadline').value;
  const link = document.getElementById('f-link').value.trim();
  const notes = document.getElementById('f-notes').value.trim();

  if (!client || !description) return;

  if (editingId) {
    const o = orders.find(x => x.id === editingId);
    Object.assign(o, { client, type, description, price, deposit, deadline, link, notes });
  } else {
    orders.push({
      id: Date.now().toString(36) + Math.random().toString(36).slice(2, 7),
      client, type, description, price, deposit, deadline, link, notes,
      status: 'attente',
      archived: false,
      createdAt: new Date().toISOString()
    });
  }
  save();
  closeModal();
  render();
});

document.getElementById('delete-btn').addEventListener('click', () => {
  if (!editingId) return;
  orders = orders.filter(o => o.id !== editingId);
  save();
  closeModal();
  render();
});

// ---------- CSV export ----------
document.getElementById('export-btn').addEventListener('click', () => {
  const headers = ['client', 'type', 'description', 'prix', 'acompte', 'deadline', 'statut', 'lien', 'notes', 'date de creation'];
  const rows = orders.map(o => [
    o.client, o.type, o.description, o.price, o.deposit, o.deadline,
    STATUSES.find(s => s.key === o.status)?.label || o.status,
    o.link, o.notes, o.createdAt
  ]);
  const csvContent = [headers, ...rows]
    .map(row => row.map(cell => `"${String(cell || '').replace(/"/g, '""')}"`).join(','))
    .join('\n');
  const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'commissions.csv';
  a.click();
  URL.revokeObjectURL(url);
});

// Board is visible by default on the "actif" tab
document.getElementById('board').classList.remove('hidden');

render();
</script>
</body>
